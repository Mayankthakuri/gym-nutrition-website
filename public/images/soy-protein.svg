<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="jar1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="label1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#6B3F22"/>
      <stop offset="100%" stop-color="#4A2A15"/>
    </linearGradient>
  </defs>
  <!-- Jar body -->
  <rect x="80" y="100" width="240" height="350" rx="20" fill="url(#jar1)"/>
  <!-- Lid -->
  <rect x="70" y="60" width="260" height="50" rx="8" fill="#111"/>
  <rect x="70" y="55" width="260" height="15" rx="6" fill="#333"/>
  <!-- Label -->
  <rect x="85" y="160" width="230" height="260" rx="5" fill="url(#label1)"/>
  <!-- Label gold border -->
  <rect x="90" y="165" width="220" height="250" rx="3" fill="none" stroke="#D4A54A" stroke-width="2"/>
  <!-- Logo B -->
  <circle cx="200" cy="210" r="30" fill="#D4A54A"/>
  <text x="200" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="32" fill="#1a1a1a">B</text>
  <!-- Brand name -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="#D4A54A">Bioton</text>
  <!-- Product type -->
  <rect x="120" y="280" width="160" height="24" rx="12" fill="#D4A54A"/>
  <text x="200" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#1a1a1a">RICH CHOCOLATE</text>
  <!-- Main text -->
  <text x="200" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="20" fill="#fff">100%</text>
  <text x="200" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#D4A54A">SOY PROTEIN</text>
  <text x="200" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#fff">ISOLATE</text>
  <!-- Weight -->
  <text x="200" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#ccc">Net weight 1 Kg</text>
  <!-- Green dot -->
  <circle cx="310" cy="175" r="6" fill="#138808"/>
  <!-- Scratch card -->
  <rect x="92" y="170" width="55" height="28" rx="3" fill="#D4A54A"/>
  <text x="120" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1a1a1a">SCRATCH</text>
  <text x="120" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1a1a1a">CARD INSIDE</text>
</svg>
