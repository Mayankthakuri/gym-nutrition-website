<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" width="420" height="520">
  <defs>
    <linearGradient id="tubBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#2d2d2d"/>
      <stop offset="70%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="goldLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="30%" stop-color="#E8C840"/>
      <stop offset="60%" stop-color="#D4A54A"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#C4982A"/>
    </linearGradient>
  </defs>

  <!-- Tub Body - wider -->
  <path d="M80,120 Q80,108 95,102 L325,102 Q340,108 340,120 L350,430 Q350,465 310,470 L110,470 Q70,465 70,430 Z" fill="url(#tubBody)"/>
  
  <!-- Tub Shine -->
  <path d="M95,120 L95,430 Q95,455 115,460 L120,460 L120,120 Z" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Lid -->
  <rect x="60" y="50" width="300" height="55" rx="10" fill="#111"/>
  <rect x="55" y="40" width="310" height="18" rx="8" fill="#1a1a1a"/>
  <rect x="55" y="33" width="310" height="12" rx="6" fill="#2a2a2a"/>
  <path d="M60,50 L360,50 L360,55 L60,55 Z" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main Label -->
  <rect x="88" y="140" width="244" height="300" rx="3" fill="#1a1a1a"/>
  
  <!-- Gold top stripe -->
  <rect x="88" y="140" width="244" height="40" fill="url(#goldLabel)"/>
  
  <!-- Logo on gold -->
  <circle cx="210" cy="160" r="16" fill="#fff"/>
  <text x="210" y="166" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="18" fill="#D4782F">B</text>
  <text x="230" y="152" font-family="Arial" font-size="6" fill="#8C4510">®</text>
  
  <!-- Bioton on gold -->
  <text x="210" y="190" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="16" fill="#3E2510">Bioton</text>
  
  <!-- Flavor text -->
  <text x="210" y="210" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#D4A54A" letter-spacing="2">RICH CHOCOLATE</text>
  
  <!-- Gold divider -->
  <rect x="100" y="218" width="220" height="2" fill="url(#goldAccent)"/>
  
  <!-- 100% -->
  <text x="120" y="258" font-family="Arial" font-weight="900" font-size="32" fill="url(#goldAccent)">100%</text>
  
  <!-- WHEY -->
  <text x="210" y="295" text-anchor="middle" font-family="Arial" font-weight="900" font-size="38" fill="#fff" letter-spacing="2">WHEY</text>
  
  <!-- PROTEIN -->
  <text x="210" y="325" text-anchor="middle" font-family="Arial" font-weight="700" font-size="22" fill="url(#goldAccent)" letter-spacing="4">PROTEIN</text>
  
  <!-- Gold Quality badge -->
  <rect x="145" y="338" width="130" height="20" rx="10" fill="url(#goldLabel)"/>
  <text x="210" y="352" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#3E2510" letter-spacing="1">GOLD QUALITY</text>
  
  <!-- Digestive Enzyme -->
  <text x="210" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">With Digestive Enzyme</text>
  
  <!-- Net Weight -->
  <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#999">Net Weight 10 LBS (4.54 Kg)</text>
  
  <!-- Green Veg -->
  <rect x="310" y="148" width="18" height="18" rx="2" fill="#fff"/>
  <circle cx="319" cy="157" r="5" fill="#138808"/>
  
  <!-- Scratch Card -->
  <rect x="92" y="150" width="50" height="26" rx="3" fill="url(#goldLabel)"/>
  <text x="117" y="161" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#3E2510">SCRATCH</text>
  <text x="117" y="170" text-anchor="middle" font-family="Arial" font-size="5" font-weight="bold" fill="#3E2510">CARD INSIDE!!!</text>
  
  <!-- Bottom -->
  <ellipse cx="210" cy="470" rx="120" ry="8" fill="#1a1a1a"/>
</svg>
