<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="jar2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="label2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC2222"/>
      <stop offset="50%" stop-color="#AA1A1A"/>
      <stop offset="100%" stop-color="#881111"/>
    </linearGradient>
  </defs>
  <!-- Jar body -->
  <rect x="60" y="100" width="280" height="360" rx="20" fill="url(#jar2)"/>
  <!-- Lid -->
  <rect x="50" y="55" width="300" height="55" rx="8" fill="#111"/>
  <rect x="50" y="48" width="300" height="18" rx="6" fill="#333"/>
  <!-- Label -->
  <rect x="70" y="160" width="260" height="280" rx="5" fill="url(#label2)"/>
  <!-- Label gold border -->
  <rect x="75" y="165" width="250" height="270" rx="3" fill="none" stroke="#D4A54A" stroke-width="2"/>
  <!-- Logo B -->
  <circle cx="200" cy="210" r="30" fill="#fff"/>
  <text x="200" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="32" fill="#CC2222">B</text>
  <!-- Brand name -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="#fff">Bioton</text>
  <!-- Product type -->
  <rect x="110" y="280" width="180" height="24" rx="12" fill="#D4A54A"/>
  <text x="200" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#1a1a1a">RICH CHOCOLATE</text>
  <!-- Main text -->
  <text x="200" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#fff">PERFORMANCE</text>
  <text x="200" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="32" fill="#fff">WHEY</text>
  <!-- Weight -->
  <text x="200" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Net Weight 10 LBS (4.54 Kg)</text>
  <!-- Green dot -->
  <circle cx="310" cy="175" r="6" fill="#138808"/>
  <!-- Scratch card -->
  <rect x="77" y="170" width="55" height="28" rx="3" fill="#D4A54A"/>
  <text x="105" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1a1a1a">SCRATCH</text>
  <text x="105" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1a1a1a">CARD INSIDE</text>
</svg>
