<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="jarBody3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#2d2d2d"/>
      <stop offset="70%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="redLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC2222"/>
      <stop offset="40%" stop-color="#AA1A1A"/>
      <stop offset="100%" stop-color="#881111"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#D4A54A"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
  </defs>

  <!-- Jar Body -->
  <path d="M100,130 Q100,120 110,115 L290,115 Q300,120 300,130 L310,440 Q310,470 280,475 L120,475 Q90,470 90,440 Z" fill="url(#jarBody3)"/>
  
  <!-- Jar Shine -->
  <path d="M115,130 L115,440 Q115,460 130,465 L135,465 L135,130 Z" fill="rgba(255,255,255,0.04)"/>
  
  <!-- Lid -->
  <rect x="80" y="60" width="240" height="55" rx="10" fill="#111"/>
  <rect x="75" y="50" width="250" height="18" rx="8" fill="#222"/>
  <rect x="75" y="45" width="250" height="10" rx="5" fill="#333"/>
  <path d="M80,60 L320,60 L320,65 L80,65 Z" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Label Background -->
  <rect x="95" y="160" width="210" height="290" rx="4" fill="#1a1a1a"/>
  
  <!-- Red top section -->
  <rect x="95" y="160" width="210" height="180" fill="url(#redLabel)"/>
  
  <!-- Gold border on red -->
  <rect x="100" y="165" width="200" height="170" rx="2" fill="none" stroke="url(#gold3)" stroke-width="1"/>
  
  <!-- Logo Circle on red -->
  <circle cx="200" cy="210" r="28" fill="#fff"/>
  <text x="200" y="220" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="28" fill="#CC2222">B</text>
  
  <!-- Registered -->
  <text x="228" y="195" font-family="Arial" font-size="8" fill="#fff">®</text>
  
  <!-- Brand Name on red -->
  <text x="200" y="260" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="18" fill="#fff">Bioton</text>
  
  <!-- Flavor -->
  <rect x="120" y="275" width="160" height="22" rx="11" fill="url(#gold3)"/>
  <text x="200" y="290" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#1a1a1a" letter-spacing="1">RICH CHOCOLATE</text>
  
  <!-- Gold divider -->
  <rect x="100" y="305" width="200" height="2" fill="url(#gold3)"/>
  
  <!-- PERFORMANCE -->
  <text x="200" y="345" text-anchor="middle" font-family="Arial" font-weight="900" font-size="22" fill="#fff" letter-spacing="1">PERFORMANCE</text>
  
  <!-- WHEY - large -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial" font-weight="900" font-size="42" fill="#fff" letter-spacing="2">WHEY</text>
  
  <!-- Net Weight -->
  <text x="200" y="420" text-anchor="middle" font-family="Arial" font-size="10" fill="#999">Net Weight 10 LBS (4.54 Kg)</text>
  
  <!-- Green Veg -->
  <rect x="305" y="170" width="16" height="16" rx="2" fill="#fff"/>
  <circle cx="313" cy="178" r="5" fill="#138808"/>
  
  <!-- Scratch Card -->
  <rect x="102" y="175" width="48" height="24" rx="3" fill="url(#gold3)"/>
  <text x="126" y="185" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#1a1a1a">SCRATCH</text>
  <text x="126" y="194" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#1a1a1a">CARD INSIDE!!!</text>
  
  <!-- Bottom -->
  <ellipse cx="200" cy="475" rx="95" ry="8" fill="#1a1a1a"/>
</svg>
